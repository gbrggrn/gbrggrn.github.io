---
layout: default
---
<div class="row justify-content-center mb-3">
  
    <div>
      <div class="category-card col-auto" onclick="toggleTimeline('edu-timeline')">
        <h3>Education</h3>
      </div>
    </div>
  
    <div class="px-3">
      <div class="category-card col-auto" onclick="toggleTimeline('work-timeline')">
        <h3>Work</h3>
      </div>
    </div>
  
    <div>
      <div class="category-card col-auto" onclick="toggleTimeline('proj-timeline')">
        <h3>Projects</h3>
      </div>
    </div>

    <div id="timeline-container" class=" col-12 mt-3">
      <div id="edu-timeline" class="timeline-wrapper"> 
        {% include timeline.html type="education" %} 
      </div>
      
      <div id="proj-timeline" class="timeline-wrapper"> 
        {% include timeline.html type="project" %} 
      </div>
      
      <div id="work-timeline" class="timeline-wrapper"> 
        {% include timeline.html type="work" %} 
      </div>
    </div>
  
</div>
